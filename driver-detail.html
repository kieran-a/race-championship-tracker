<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Driver Details - Heat Legends Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="driver-name">Driver</h1>
        <p><a href="drivers.html">&larr; Back to drivers</a></p>
    </header>
    <main>
        <section id="stats">
            <h2>Statistics</h2>
            <ul>
                <li>Championship wins: <span id="stat-championships">0</span></li>
                <li>Races entered (starts): <span id="stat-starts">0</span></li>
                <li>Race wins: <span id="stat-wins">0</span></li>
                <li>Podiums: <span id="stat-podiums">0</span></li>
            </ul>
        </section>
        <section id="bio">
            <h2>Details</h2>
            <p id="driver-country"></p>
            <p id="driver-notes"></p>
        </section>
    </main>
    <script type="module" src="driver-detail.js" defer></script>
</body>
</html>
